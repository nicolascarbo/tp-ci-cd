replicaCount: 1

image:
  repository: ghcr.io/nicolascarbo/tp-ci-cd
  pullPolicy: IfNotPresent
  tag: "v1.0.5"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

