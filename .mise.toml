[tools]
go = "1.21"
golangci-lint = "2.12.2"
helm = "3.21.1"
trivy = "0.71.2"
kubeconform = "0.6.7"

[tasks.lint]
run = "golangci-lint run ./..."
dir = "{{config_root}}/app"
description = "Run Go linter"

[tasks.test]
run = "go test ./..."
dir = "{{config_root}}/app"
description = "Run Go tests"

[tasks.security-scan]
run = "trivy fs --exit-code 1 --severity HIGH,CRITICAL ."
description = "Scan filesystem for HIGH/CRITICAL vulnerabilities"

[tasks.helm-lint]
run = "helm lint ./chart"
description = "Lint Helm chart"

[tasks.helm-validate]
run = "helm template ./chart | kubeconform -kubernetes-version 1.33.0 -strict -"
description = "Validate Helm manifests against K8s 1.33.0 schema"

[tasks.argocd-install]
run = """
kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side --force-conflicts
kubectl wait --for=condition=available --timeout=180s deployment/argocd-server -n argocd
echo "ArgoCD ready"
"""
description = "Install ArgoCD into the argocd namespace and wait for it to be ready"

[tasks.argocd-bootstrap]
run = "kubectl apply -f argocd/application.yaml"
description = "Apply the ArgoCD Application manifest (run once after argocd-install)"
depends = ["argocd-install"]

[tasks.argocd-password]
run = "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d && echo"
description = "Print the ArgoCD admin password"

[tasks.argocd-ui]
run = """
echo "ArgoCD UI → https://localhost:8080  (user: admin)"
echo "Password: $(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d)"
kubectl port-forward svc/argocd-server -n argocd 8080:443
"""
description = "Print ArgoCD credentials and open port-forward to the UI (Ctrl+C to stop)"

[tasks.argocd-status]
run = "kubectl get application tp-ci-cd -n argocd -o wide 2>/dev/null || echo 'Application not found — run: mise run argocd-bootstrap'"
description = "Show ArgoCD sync and health status for the tp-ci-cd application"
